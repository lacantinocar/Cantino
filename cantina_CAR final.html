<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CAR Cantina"/>
<title>CAR — Cantina</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#2B3A6B;--navy2:#1e2d56;--navy3:#162247;
  --celeste:#6BAED6;--celeste2:#4a90c4;--celeste-bg:#e8f2fa;
  --bg:#ffffff;--bg2:#f4f6fb;--bg3:#e8edf7;
  --text:#1a1e2e;--text2:#5a6278;--text3:#9aa0b4;
  --border:#d4daea;--border2:#b8c2d8;
  --red:#c0392b;--red-bg:#fdecea;--red-dark:#96231a;
  --green:#1a7a50;--green-bg:#e3f5ec;--green-dark:#125c3a;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1320;--bg2:#1a2035;--bg3:#242b45;
    --text:#e8ecf8;--text2:#8892b0;--text3:#4a5568;
    --border:#2d3654;--border2:#3d4d70;
    --navy:#3d52a0;--navy2:#2b3a6b;--celeste:#5ba3cc;--celeste-bg:#0d1f35;
    --red:#e05c4a;--red-bg:#2e0e0a;--red-dark:#f09080;
    --green:#2ecc85;--green-bg:#0a2318;--green-dark:#5de0a0;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg2);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px;background:var(--bg)}

/* TOPBAR */
.topbar{background:var(--navy);padding:10px 16px 10px;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px}
.topbar img{width:38px;height:38px;object-fit:contain;flex-shrink:0}
.topbar-info h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:.02em}
.topbar-info p{font-size:11px;color:var(--celeste);font-weight:500}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--navy);border-top:1px solid var(--navy2);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 7px;border:none;background:transparent;cursor:pointer;font-family:inherit;gap:3px}
.bnav-btn .ic{font-size:19px}
.bnav-btn .lb{font-size:10px;color:rgba(255,255,255,.5);font-weight:500}
.bnav-btn.active .lb{color:var(--celeste)}
.bnav-btn.active .ic{filter:drop-shadow(0 0 4px var(--celeste))}

/* SECTIONS */
.sec{display:none;padding:12px 14px}
.sec.on{display:block}

/* CARDS */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--celeste);border-radius:2px}

/* FORM */
.input-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.input-row:last-child{margin-bottom:0}
.input-row label{font-size:13px;color:var(--text2);min-width:68px;flex-shrink:0}
input[type=text],input[type=number],input[type=date],select,textarea{flex:1;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:15px;font-family:inherit;background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none;appearance:none;min-width:0}
textarea{resize:vertical;min-height:60px}
input:focus,select:focus,textarea:focus{border-color:var(--celeste2);box-shadow:0 0 0 3px rgba(107,174,214,.18)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:14px;font-family:inherit;color:var(--text);font-weight:500;white-space:nowrap;transition:opacity .15s}
.btn:active{opacity:.7}
.btn.navy{background:var(--navy);border-color:var(--navy2);color:#fff}
.btn.celeste{background:var(--celeste2);border-color:var(--celeste);color:#fff}
.btn.r{color:var(--red);border-color:var(--red)}
.btn.sm{padding:6px 12px;font-size:13px}

/* LIST ROWS */
.lrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border)}
.lrow:last-child{border-bottom:none;padding-bottom:0}
.lrow-name{flex:1;font-size:15px;font-weight:500;color:var(--text);cursor:pointer}
.lrow-name:hover{color:var(--navy)}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge.red{background:var(--red-bg);color:var(--red-dark)}
.badge.green{background:var(--green-bg);color:var(--green-dark)}
.badge.gray{background:var(--bg3);color:var(--text2)}
.badge.navy{background:var(--navy);color:#fff}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.metric{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;border:0.5px solid var(--border)}
.metric .ml{font-size:11px;color:var(--text2);margin-bottom:2px;font-weight:500}
.metric .mv{font-size:17px;font-weight:700;color:var(--text)}
.metric .mv.red{color:var(--red)}
.metric .mv.green{color:var(--green)}
.metric .mv.navy{color:var(--navy)}

/* CATALOG */
.cat-label{font-size:11px;font-weight:700;color:var(--celeste2);letter-spacing:.07em;text-transform:uppercase;padding:12px 0 6px;display:flex;align-items:center;gap:6px}
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:6px}
.prod-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;cursor:pointer;transition:all .15s;position:relative}
.prod-card:active{opacity:.8}
.prod-card.sel{border:2px solid var(--navy);background:var(--celeste-bg)}
.prod-card .pn{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.3}
.prod-card .pp{font-size:13px;font-weight:700;color:var(--navy)}
.prod-card .pq{font-size:11px;color:var(--celeste2);margin-top:3px;font-weight:600}
.prod-card .sel-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--navy);display:none}
.prod-card.sel .sel-dot{display:block}

/* PEDIDO */
.pedido-box{background:var(--bg);border:1.5px solid var(--navy);border-radius:var(--radius-lg);padding:14px;margin-top:12px}
.ped-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.ped-item:last-child{border-bottom:none}
.ped-name{flex:1;font-size:13px;color:var(--text);line-height:1.3}
.qty-ctrl{display:flex;align-items:center;gap:7px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--navy);background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--navy);font-family:inherit;font-weight:700}
.qty-btn:active{background:var(--navy);color:#fff}
.qty-num{font-size:15px;font-weight:700;min-width:18px;text-align:center;color:var(--navy)}
.ped-sub{font-size:13px;font-weight:600;color:var(--text);min-width:60px;text-align:right}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;border-top:1.5px solid var(--navy);margin-top:8px;font-weight:700;font-size:16px}
.total-row .tv{color:var(--red);font-size:18px}

/* HISTORIAL */
.hist-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.hist-row:last-child{border-bottom:none}
.hr-d{flex:1;color:var(--text);line-height:1.3}
.hr-date{color:var(--text3);font-size:11px;white-space:nowrap}
.hr-cargo{font-weight:700;color:var(--red);white-space:nowrap}
.hr-pago{font-weight:700;color:var(--green);white-space:nowrap}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 5px}

/* SEARCH & FILTERS */
.search{width:100%;margin-bottom:10px;padding:10px 14px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:15px;font-family:inherit;background:var(--bg2);color:var(--text);outline:none}
.search:focus{border-color:var(--celeste2)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ftag{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500}
.ftag.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* CENA PLANTEL */
.plantel-header{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.plantel-header img{width:44px;height:44px;object-fit:contain}
.plantel-header h2{color:#fff;font-size:17px;font-weight:700}
.plantel-header p{color:var(--celeste);font-size:12px}
.jugador-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.jugador-card .jname{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:4px}
.jugador-card .jbase{font-size:13px;color:var(--text2)}
.jugador-card .jnota{font-size:13px;color:var(--text);margin-top:4px;font-style:italic}
.jugador-card .jextra{font-size:13px;color:var(--red);font-weight:500}
.jugador-card .jtotal{font-size:14px;font-weight:700;color:var(--navy);margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border)}
.cena-fecha{background:var(--navy);color:#fff;font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px;display:inline-block;margin-bottom:12px}

/* MISC */
.sep{border:none;border-top:0.5px solid var(--border);margin:10px 0}
.empty{text-align:center;color:var(--text3);font-size:14px;padding:24px 0}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-size:14px;color:var(--text2);font-family:inherit;padding:0 0 12px;font-weight:500}
.actions-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1}
.section-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
</style>
</head>

];

const CENA_BASE=12000;
let clientes=[],movimientos=[],catalogo=[],pedido={},filtrocat='Todos',cenaActiva=null,cenas=[];

function load(){
  try{const r=localStorage.getItem('car_cli');if(r)clientes=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem('car_movs');if(r)movimientos=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem('car_cat');if(r)catalogo=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem('car_cenas');if(r)cenas=JSON.parse(r);}catch(e){}
  if(!catalogo.length){catalogo=[...CATALOGO_DEFAULT];save();}
  renderClientes();renderSelect();renderCatalogo();renderFiltros();renderProductos();renderCenasHist();
}

function save(){
  localStorage.setItem('car_cli',JSON.stringify(clientes));
  localStorage.setItem('car_movs',JSON.stringify(movimientos));
  localStorage.setItem('car_cat',JSON.stringify(catalogo));
  localStorage.setItem('car_cenas',JSON.stringify(cenas));
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

const PAGE_SUBS={clientes:'Cuentas corrientes',pedido:'Registrar consumo',plantel:'Cena del jueves — Plantel',catalogo:'Productos y precios',detalle:''};

function go(sec){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+sec).classList.add('on');
  const nb=document.getElementById('nav-'+sec);if(nb)nb.classList.add('active');
  document.getElementById('page-sub').textContent=PAGE_SUBS[sec]||'';
  if(sec==='pedido'){renderSelect();renderFiltros();renderProductos();}
  if(sec==='catalogo')renderCatalogo();
  if(sec==='clientes')renderClientes();
  if(sec==='plantel'){renderCenasHist();}
  window.scrollTo(0,0);
}

function saldo(id){return movimientos.filter(m=>m.cid===id).reduce((a,m)=>m.tipo==='cargo'?a+m.monto:a-m.monto,0);}
function fmt(n){return '$'+Math.round(n).toLocaleString('es-AR');}

/* CLIENTES */
function addCliente(){
  const inp=document.getElementById('inp-cliente');
  const n=inp.value.trim();if(!n)return;
  if(clientes.find(c=>c.n.toLowerCase()===n.toLowerCase())){toast('Ya existe ese cliente');return;}
  clientes.push({id:Date.now().toString(),n});
  save();inp.value='';renderClientes();renderSelect();toast('Cliente agregado ✓');
}

function renderClientes(){
  const q=(document.getElementById('search-c')?.value||'').toLowerCase();
  const el=document.getElementById('lista-clientes');
  const f=clientes.filter(c=>c.n.toLowerCase().includes(q));
  if(!f.length){el.innerHTML='<div class="empty">No hay clientes aún</div>';return;}
  el.innerHTML=[...f].sort((a,b)=>saldo(b.id)-saldo(a.id)).map(c=>{
    const s=saldo(c.id);
    const badge=s>0?`<span class="badge red">Debe ${fmt(s)}</span>`:s<0?`<span class="badge green">A favor ${fmt(Math.abs(s))}</span>`:`<span class="badge gray">Al día</span>`;
    return `<div class="lrow">
      <span class="lrow-name" onclick="verDet('${c.id}')">${c.n}</span>
      ${badge}
      <button class="btn navy sm" onclick="irPedido('${c.id}')">+ pedido</button>
    </div>`;
  }).join('');
}

function renderSelect(){
  const s=document.getElementById('ped-cliente');if(!s)return;
  document.getElementById('ped-fecha').value=new Date().toISOString().split('T')[0];
  s.innerHTML=clientes.length?clientes.map(c=>`<option value="${c.id}">${c.n}</option>`).join(''):'<option value="">— Agregá un cliente primero —</option>';
}

function irPedido(cid){go('pedido');setTimeout(()=>{const s=document.getElementById('ped-cliente');if(s)s.value=cid;},60);}

/* PEDIDO */
function cats(){return['Todos',...new Set(catalogo.map(p=>p.cat))];}

function renderFiltros(){
  const el=document.getElementById('cat-filtros');if(!el)return;
  el.innerHTML=cats().map(c=>`<button class="ftag ${filtrocat===c?'on':''}" onclick="setFiltro('${c}')">${c}</button>`).join('');
}

function setFiltro(c){filtrocat=c;renderFiltros();renderProductos();}

function renderProductos(){
  const el=document.getElementById('cat-productos');if(!el)return;
  const prods=filtrocat==='Todos'?catalogo:catalogo.filter(p=>p.cat===filtrocat);
  if(!prods.length){el.innerHTML='<div class="empty">Sin productos</div>';return;}
  const byCat={};prods.forEach(p=>{if(!byCat[p.cat])byCat[p.cat]=[];byCat[p.cat].push(p);});
  el.innerHTML=Object.entries(byCat).map(([cat,ps])=>`
    <div class="cat-label">${cat}</div>
    <div class="prod-grid">${ps.map(p=>{
      const q=pedido[p.id]||0;
      return `<div class="prod-card ${q>0?'sel':''}" onclick="toggleProd('${p.id}')">
        <div class="sel-dot"></div>
        <div class="pn">${p.nombre}</div>
        <div class="pp">${fmt(p.precio)}</div>
        ${q>0?`<div class="pq">x${q} = ${fmt(q*p.precio)}</div>`:''}
      </div>`;
    }).join('')}</div>
  `).join('');
}

function toggleProd(pid){
  pedido[pid]=(pedido[pid]||0)+1;
  renderProductos();renderPedido();
}

function renderPedido(){
  const items=Object.entries(pedido).filter(([,q])=>q>0);
  const box=document.getElementById('pedido-box');
  if(!items.length){box.style.display='none';return;}
  box.style.display='block';
  let total=0;
  document.getElementById('pedido-lista').innerHTML=items.map(([pid,qty])=>{
    const p=catalogo.find(x=>x.id===pid);if(!p)return'';
    const sub=p.precio*qty;total+=sub;
    return `<div class="ped-item">
      <span class="ped-name">${p.nombre}</span>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="chQty('${pid}',-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="chQty('${pid}',1)">+</button>
      </div>
      <span class="ped-sub">${fmt(sub)}</span>
    </div>`;
  }).join('');
  document.getElementById('pedido-total').textContent=fmt(total);
}

function chQty(pid,d){
  pedido[pid]=(pedido[pid]||0)+d;
  if(pedido[pid]<=0)delete pedido[pid];
  renderProductos();renderPedido();
}

function limpiarPedido(){pedido={};renderProductos();renderPedido();}

function confirmarPedido(){
  const cid=document.getElementById('ped-cliente').value;
  const fecha=document.getElementById('ped-fecha').value;
  const items=Object.entries(pedido).filter(([,q])=>q>0);
  if(!cid||!items.length){toast('Seleccioná cliente y productos');return;}
  const desc=items.map(([pid,qty])=>{const p=catalogo.find(x=>x.id===pid);return`${p.nombre} x${qty}`;}).join(', ');
  const total=items.reduce((a,[pid,qty])=>{const p=catalogo.find(x=>x.id===pid);return a+p.precio*qty;},0);
  movimientos.push({id:Date.now().toString(),cid,tipo:'cargo',desc,monto:total,fecha});
  save();limpiarPedido();
  const cl=clientes.find(c=>c.id===cid);
  toast(`Anotado para ${cl?.n}: ${fmt(total)} ✓`);
  renderClientes();
}

/* DETALLE CLIENTE */
function verDet(cid){
  const c=clientes.find(x=>x.id===cid);if(!c)return;
  go('detalle');
  document.getElementById('page-sub').textContent=c.n;
  const movs=movimientos.filter(m=>m.cid===cid).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const s=saldo(cid);
  const shtml=s>0?`<span style="color:var(--red);font-weight:700">Debe ${fmt(s)}</span>`:s<0?`<span style="color:var(--green);font-weight:700">A favor ${fmt(Math.abs(s))}</span>`:`<span style="color:var(--text3)">Al día</span>`;
  const cargos=movimientos.filter(m=>m.cid===cid&&m.tipo==='cargo').reduce((a,m)=>a+m.monto,0);
  const pagos=movimientos.filter(m=>m.cid===cid&&m.tipo==='pago').reduce((a,m)=>a+m.monto,0);
  const mhtml=movs.length?movs.map(m=>`
    <div class="hist-row">
      <span class="hr-d">${m.desc}</span>
      <span class="hr-date">${m.fecha.split('-').reverse().join('/')}</span>
      <span class="${m.tipo==='cargo'?'hr-cargo':'hr-pago'}">${m.tipo==='cargo'?'−':'+'}${fmt(m.monto)}</span>
      <button class="del-btn" onclick="delMov('${m.id}','${cid}')">✕</button>
    </div>`).join(''):'<div class="empty">Sin movimientos</div>';

  document.getElementById('det-content').innerHTML=`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:18px;font-weight:700;color:var(--navy)">${c.n}</span>${shtml}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div class="metric"><div class="ml">Consumido</div><div class="mv red">${fmt(cargos)}</div></div>
        <div class="metric"><div class="ml">Pagado</div><div class="mv green">${fmt(pagos)}</div></div>
      </div>
      <div class="actions-row">
        <button class="btn navy sm" onclick="irPedido('${cid}');go('pedido')">+ Nuevo pedido</button>
        <button class="btn celeste sm" onclick="abrirPago('${cid}')">✓ Registrar pago</button>
        <button class="btn r sm" onclick="delCliente('${cid}')">Eliminar</button>
      </div>
      <div id="pago-form-${cid}" style="display:none;margin-bottom:12px;padding:12px;background:var(--bg2);border-radius:var(--radius)">
        <div class="input-row"><label>Monto $</label><input type="number" id="pago-m" placeholder="0" min="0"/></div>
        <div class="input-row"><label>Nota</label><input type="text" id="pago-n" placeholder="Efectivo, transferencia..."/></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn sm" onclick="document.getElementById('pago-form-${cid}').style.display='none'">Cancelar</button>
          <button class="btn navy sm" onclick="regPago('${cid}')">Confirmar pago</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Historial de movimientos</div>
      ${mhtml}
    </div>
  `;
}

function abrirPago(cid){
  const f=document.getElementById('pago-form-'+cid);
  if(f){f.style.display='block';document.getElementById('pago-m').focus();}
}

function regPago(cid){
  const m=parseFloat(document.getElementById('pago-m').value);
  const nota=document.getElementById('pago-n').value.trim();
  if(!m||m<=0){toast('Ingresá un monto');return;}
  const fecha=new Date().toISOString().split('T')[0];
  movimientos.push({id:Date.now().toString(),cid,tipo:'pago',desc:nota||'Pago',monto:m,fecha});
  save();
  const cl=clientes.find(c=>c.id===cid);
  toast(`Pago de ${fmt(m)} registrado ✓`);
  renderClientes();verDet(cid);
}

function delMov(mid,cid){
  if(!confirm('¿Eliminar este movimiento?'))return;
  movimientos=movimientos.filter(m=>m.id!==mid);
  save();verDet(cid);renderClientes();
}

function delCliente(cid){
  const c=clientes.find(x=>x.id===cid);
  if(!confirm(`¿Eliminar a ${c?.n} y todo su historial?`))return;
  clientes=clientes.filter(x=>x.id!==cid);
  movimientos=movimientos.filter(m=>m.cid!==cid);
  save();go('clientes');toast('Cliente eliminado');
}

/* CENA PLANTEL */
function crearCena(){
  const fecha=document.getElementById('cena-fecha').value;
  if(!fecha){toast('Seleccioná una fecha');return;}
  cenaActiva={id:Date.now().toString(),fecha,jugadores:[]};
  document.getElementById('cena-activa-box').style.display='block';
  renderJugadores();toast('Cena creada — agregá los jugadores ✓');
}

function addJugador(){
  const nombre=document.getElementById('jug-nombre').value.trim();
  const extras=document.getElementById('jug-extras').value.trim();
  const extraPrecio=parseFloat(document.getElementById('jug-extra-precio').value)||0;
  const nota=document.getElementById('jug-nota').value.trim();
  if(!nombre){toast('Ingresá el nombre del jugador');return;}
  if(!cenaActiva)return;
  cenaActiva.jugadores.push({id:Date.now().toString(),nombre,extras,extraPrecio,nota,total:CENA_BASE+extraPrecio});
  document.getElementById('jug-nombre').value='';
  document.getElementById('jug-extras').value='';
  document.getElementById('jug-extra-precio').value='';
  document.getElementById('jug-nota').value='';
  renderJugadores();toast(`${nombre} agregado ✓`);
}

function delJugador(jid){
  if(!cenaActiva)return;
  cenaActiva.jugadores=cenaActiva.jugadores.filter(j=>j.id!==jid);
  renderJugadores();
}

function renderJugadores(){
  if(!cenaActiva)return;
  const el=document.getElementById('jugadores-lista');
  const total=cenaActiva.jugadores.reduce((a,j)=>a+j.total,0);
  document.getElementById('cena-total').textContent=fmt(total);
  if(!cenaActiva.jugadores.length){
    el.innerHTML=`<div class="card-title">Jugadores (0)</div><div class="empty">Agregá jugadores arriba</div>`;
    return;
  }
  el.innerHTML=`<div class="card-title">Jugadores (${cenaActiva.jugadores.length})</div>`+
    cenaActiva.jugadores.map(j=>`
    <div class="jugador-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="jname">${j.nombre}</div>
        <button class="del-btn" onclick="delJugador('${j.id}')">✕</button>
      </div>
      <div class="jbase">Cena base: ${fmt(CENA_BASE)}</div>
      ${j.extras?`<div class="jextra">+ ${j.extras}${j.extraPrecio>0?' (+'+fmt(j.extraPrecio)+')':''}</div>`:''}
      ${j.nota?`<div class="jnota">${j.nota}</div>`:''}
      <div class="jtotal">Total: ${fmt(j.total)}</div>
    </div>
  `).join('');
}

function cerrarCena(){
  if(!cenaActiva||!cenaActiva.jugadores.length){toast('Agregá al menos un jugador');return;}
  cenas.unshift({...cenaActiva});
  save();
  cenaActiva=null;
  document.getElementById('cena-activa-box').style.display='none';
  document.getElementById('cena-fecha').value='';
  renderCenasHist();
  toast('Cena guardada ✓');
}

function cancelarCena(){
  if(!confirm('¿Cancelar la cena actual?'))return;
  cenaActiva=null;
  document.getElementById('cena-activa-box').style.display='none';
}

function renderCenasHist(){
  const el=document.getElementById('cenas-historial');if(!el)return;
  if(!cenas.length){el.innerHTML='<div class="empty">No hay cenas registradas aún</div>';return;}
  el.innerHTML=cenas.map(cena=>{
    const total=cena.jugadores.reduce((a,j)=>a+j.total,0);
    const fecha=cena.fecha.split('-').reverse().join('/');
    return `<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="cena-fecha">Jueves ${fecha}</span>
        <span style="font-weight:700;color:var(--navy)">${fmt(total)}</span>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${cena.jugadores.length} jugadores</div>
      ${cena.jugadores.map(j=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:13px">
          <span style="color:var(--text)">${j.nombre}${j.extras?' + '+j.extras:''}</span>
          <span style="font-weight:600;color:var(--navy)">${fmt(j.total)}</span>
        </div>
      `).join('')}
      <div style="display:flex;justify-content:flex-end;margin-top:8px">
        <button class="btn r sm" onclick="delCena('${cena.id}')">Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

function delCena(cid){
  if(!confirm('¿Eliminar esta cena?'))return;
  cenas=cenas.filter(c=>c.id!==cid);
  save();renderCenasHist();toast('Cena eliminada');
}

/* CATALOGO */
function addProd(){
  const cat=document.getElementById('cat-sel').value;
  const nom=document.getElementById('cat-nom').value.trim();
  const pre=parseFloat(document.getElementById('cat-pre').value);
  if(!nom||!pre||pre<=0){toast('Completá nombre y precio');return;}
  catalogo.push({id:'u'+Date.now(),cat,nombre:nom,precio:pre});
  save();document.getElementById('cat-nom').value='';document.getElementById('cat-pre').value='';
  renderCatalogo();renderFiltros();renderProductos();toast('Producto agregado ✓');
}

function editPrecio(pid){
  const p=catalogo.find(x=>x.id===pid);if(!p)return;
  const v=prompt(`Nuevo precio para "${p.nombre}"\nActual: $${p.precio}`,p.precio);
  if(v===null)return;
  const val=parseFloat(v);
  if(!val||val<=0){toast('Precio inválido');return;}
  p.precio=val;save();renderCatalogo();renderProductos();toast('Precio actualizado ✓');
}

function delProd(pid){
  if(!confirm('¿Eliminar este producto?'))return;
  catalogo=catalogo.filter(p=>p.id!==pid);
  save();renderCatalogo();renderFiltros();renderProductos();
}

function renderCatalogo(){
  const el=document.getElementById('lista-catalogo');if(!el)return;
  const byCat={};catalogo.forEach(p=>{if(!byCat[p.cat])byCat[p.cat]=[];byCat[p.cat].push(p);});
  if(!Object.keys(byCat).length){el.innerHTML='<div class="empty">Sin productos</div>';return;}
  el.innerHTML=Object.entries(byCat).map(([cat,ps])=>`
    <div class="cat-label">${cat}</div>
    ${ps.map(p=>`<div class="lrow">
      <span style="flex:1;font-size:14px;color:var(--text)">${p.nombre}</span>
      <span style="font-weight:700;color:var(--navy);margin-right:10px">${fmt(p.precio)}</span>
      <button class="btn navy sm" onclick="editPrecio('${p.id}')">Editar</button>
      <button class="btn r sm" onclick="delProd('${p.id}')">✕</button>
    </div>`).join('')}
    <hr class="sep"/>
  `).join('');
}

load();
</script>
</body>
